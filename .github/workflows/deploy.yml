name: Deploy Vite Site to GitHub Pages Repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-github-pages-repo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: |
          pnpm exec tsc -b
          pnpm exec vite build --base=/

      - name: Add custom domain
        run: echo 'www.lxinz.cn' > dist/CNAME

      - name: Deploy dist to pages repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd dist
          git init
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "deploy: publish site"
          git branch -M main
          git remote add origin https://1999-xinz:${GH_TOKEN}@github.com/1999-xinz/1999-xinz.github.io.git
          git push origin main --force
